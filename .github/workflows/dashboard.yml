on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 2 * * *'  # Run daily at 2:00 UTC

permissions:
  contents: write
  
name: dashboard

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    container: rqthomas/vera-rocker:latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      MW_ACCESS_KEY_ID: ${{ secrets.MW_ACCESS_KEY_ID }}
      MW_ACCESS_SECRET: ${{ secrets.MW_ACCESS_SECRET }}
      DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: clone lake repository
        uses: actions/checkout@v6
        with:
          repository: ecoforecastVT/YARR-forecast
          token: ${{ secrets.GIT_PAT }}
          path: forecast-code

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail

          # Retry apt metadata refresh
          for i in 1 2 3; do
            apt-get update && break
            echo "apt-get update failed (attempt $i), retrying in 20s..."
            sleep 20
          done

          # Retry package install
          for i in 1 2 3; do
            apt-get install -y --fix-missing \
              libcurl4-openssl-dev libssl-dev libxml2-dev \
              libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
              curl jq && break
            echo "apt-get install failed (attempt $i), retrying in 30s..."
            sleep 30
            apt-get update
          done

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c(
            "tidyverse", "arrow", "bslib", "bsicons",
            "leaflet", "oce", "glue", "sf", "jpeg", "lubridate", "curl", "minioclient",
            "downloadthis", "staticryptR"
          ))
          install.packages("remotes")
          #remotes::install_github("eco4cast/minioclient")
          install.packages("staticryptR", repos = c(
            "https://zajichek.r-universe.dev",
            "https://cloud.r-project.org"
          ))

      - name: Install MinIO client (mc)
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc --version

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2


      - name: Render and encrypt dashboard
        working-directory: forecast-code/dashboard
        shell: bash
        run: |

          mkdir -p ../encrypted_output

          # Render directly to a deterministic file
          quarto render YARR_dashboard.qmd

          # Verify rendered HTML exists and is non-empty
          if [[ ! -s "./_output/YARR_dashboard.html" ]]; then
            echo "ERROR: YARR_dashboard.html was not generated or is empty"
            exit 1
          fi

          # Encrypt output
          npx --yes staticrypt ./_output/YARR_dashboard.html \
            -p "${DASHBOARD_PASSWORD}" \
            -o ../encrypted/index.html

          # Verify encrypted output exists and is non-empty
          if [[ ! -s "../encrypted/index.html" ]]; then
            echo "ERROR: encrypted/index.html missing or empty"
            exit 1

          fi

          echo "Dashboard render + encryption succeeded"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: forecast-code/dashboard/encrypted
          publish_branch: gh-pages
